version: '3.8'

services:
  backend:
    build: ./backend
    container_name: wc-predictor-backend
    ports:
      - "8000:8000"
    environment:
      - MOCK_MODE=true
      - API_FOOTBALL_DATA_KEY=${API_FOOTBALL_DATA_KEY:-}
    volumes:
      - ./backend/data/cache:/app/data/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: wc-predictor-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
